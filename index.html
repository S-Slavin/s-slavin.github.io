<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaina Slavin - Portfolio</title>
    <script>
        // Function to detect if device is mobile
        function isMobile() {
            return window.innerWidth <= 768;
        }

        // Get the base path for GitHub Pages
        function getBasePath() {
            // For GitHub Pages, we want to use the root path
            if (window.location.hostname === 's-slavin.github.io') {
                return '/';
            }
            // For local development, use the current path
            const path = window.location.pathname;
            return path.endsWith('/') ? path : path.substring(0, path.lastIndexOf('/') + 1);
        }

        // Redirect based on device type
        function redirect() {
            const basePath = getBasePath();
            // Always use desktop version on GitHub Pages
            const targetPath = window.location.hostname === 's-slavin.github.io' ? 'desktop/index.html' : (isMobile() ? 'mobile/index.html' : 'desktop/index.html');
            const fullPath = basePath + targetPath;
            
            // Add a timestamp to prevent caching issues
            window.location.href = fullPath + '?t=' + new Date().getTime();
        }

        // Redirect on page load
        window.onload = redirect;

        // Redirect on window resize
        window.onresize = redirect;
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
        }
        .loading {
            text-align: center;
            color: #1f2937;
        }
    </style>
</head>
<body>
    <div class="loading">
        <h1>Loading...</h1>
    </div>
</body>
</html>
