<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Shaina Slavin - Portfolio</title>
    <script>
        // Force reload if cached
        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_BACK_FORWARD) {
            window.location.reload();
        }
        
        // Use window width to detect mobile devices
        const isMobile = window.innerWidth <= 600;
        // Redirect based on device type with cache busting
        if (isMobile) {
            window.location.href = 'mobile/index.html?v=' + new Date().getTime();
        } else {
            window.location.href = 'desktop/index.html?v=' + new Date().getTime();
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            overflow: hidden;
        }
        p {
            color: #666;
            font-size: 1.2rem;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <p>Redirecting to the appropriate version...</p>
</body>
</html>
