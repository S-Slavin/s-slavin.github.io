<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="HandheldFriendly" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Force GitHub Pages rebuild -->
    <title>Shaina Slavin - Portfolio</title>
    <script>
        // Function to detect mobile devices
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 600;
        }

        // Function to handle redirection
        function redirect() {
            const timestamp = new Date().getTime();
            if (isMobile()) {
                window.location.href = 'mobile/index.html?v=' + timestamp;
            } else {
                window.location.href = 'desktop/index.html?v=' + timestamp;
            }
        }

        // Execute redirection immediately
        redirect();
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f8fafc;
            color: #1f2937;
        }
        p {
            font-size: 1.2rem;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <p>Redirecting to the appropriate version...</p>
</body>
</html>
